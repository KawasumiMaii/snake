<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>贪吃蛇</h1>

    <div id="settingsPanel">
        <h2>游戏设置</h2>
        <div>
            <label for="initialLength">初始长度 (1-10):</label>
            <input type="number" id="initialLength" name="initialLength" value="3" min="1" max="10">
        </div>
        <div>
            <p>选择速度:</p>
            <input type="radio" id="speedSlow" name="speed" value="slow" checked>
            <label for="speedSlow">慢</label>
            <input type="radio" id="speedMedium" name="speed" value="medium">
            <label for="speedMedium">中</label>
            <input type="radio" id="speedFast" name="speed" value="fast">
            <label for="speedFast">快</label>
        </div>
        <button id="startGameButton">开始游戏</button>
    </div>

    <div id="gameArea" style="display: none;"> <!-- Game area initially hidden -->
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <p>分数: <span id="score">0</span></p>
            <p style="margin-left: 20px;">长度: <span id="length">1</span></p>
            <button id="pauseButton" style="margin-left: 20px;">暂停</button>
            <button id="restartButton" style="margin-left: 10px;">重新开始</button> <!-- New Restart Button -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
